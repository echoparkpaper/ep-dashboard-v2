<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Insurance - Admin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231e3a5f'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Garamond,Adobe Garamond Pro,Georgia,serif' font-size='15' font-weight='normal' letter-spacing='1' fill='white'%3EMI%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede8;--surface:#ffffff;--surface2:#f7f5f2;--border:#e0dbd3;--border2:#ccc7be;
  --accent:#2c5282;--accent-light:#ebf0f8;--green:#1D9E75;--red:#c0392b;--orange:#BA7517;
  --muted:#7a8090;--text:#1a2332;--header:#1e3a5f;
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:360px;box-shadow:0 12px 40px rgba(0,0,0,0.08);}
.login-logo{font-family:var(--serif);font-size:22px;color:var(--header);margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--muted);margin-bottom:24px;font-family:var(--mono);}
.login-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.login-btn:hover{background:#1e3a5f;}
.login-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;}

/* ── Shell ── */
.shell{display:none;flex-direction:column;min-height:100vh;}
header{background:var(--header);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:var(--serif);font-size:1.25rem;color:#fff;}
.logo-sub{font-size:10px;color:rgba(168,196,224,0.7);font-family:var(--mono);margin-left:12px;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-link{color:rgba(168,196,224,0.8);font-size:11px;font-family:var(--mono);text-decoration:none;padding:5px 10px;border-radius:6px;transition:all 0.15s;}
.header-link:hover{background:rgba(255,255,255,0.1);color:#fff;}
.header-user{color:#a8c4e0;font-size:11px;font-family:var(--mono);}
.logout-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:11px;font-family:var(--sans);padding:5px 12px;border-radius:6px;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,0.2);}

/* ── Content ── */
.content{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%;}
.page-title{font-family:var(--serif);font-size:1.2rem;color:var(--header);margin-bottom:20px;}

/* ── Stats ── */
.stats-row{display:flex;gap:12px;margin-bottom:24px;}
.stat-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:500;}

/* ── Table ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:600;color:var(--text);}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:background 0.15s;}
.add-btn:hover{background:#1e3a5f;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:10px 16px;font-size:12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.role-badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;font-weight:500;}
.role-admin{background:#ebf0f8;color:var(--accent);}
.role-user{background:var(--surface2);color:var(--muted);}
.action-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:10px;font-family:var(--sans);color:var(--muted);cursor:pointer;transition:all 0.15s;margin-right:4px;}
.action-btn:hover{background:var(--surface2);color:var(--text);}
.action-btn.danger{color:var(--red);border-color:rgba(192,57,43,0.2);}
.action-btn.danger:hover{background:#fdecea;color:var(--red);}
.date-text{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:400px;box-shadow:0 20px 50px rgba(0,0,0,0.15);}
.modal-title{font-family:var(--serif);font-size:1rem;color:var(--header);margin-bottom:16px;}
.form-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;margin-bottom:12px;}
.form-input:focus{border-color:var(--accent);}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;margin-bottom:12px;appearance:none;-webkit-appearance:none;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.modal-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 16px;font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--sans);}
.modal-cancel:hover{color:var(--text);}
.modal-save{background:var(--accent);border:none;border-radius:6px;padding:7px 16px;font-size:12px;color:#fff;cursor:pointer;font-family:var(--sans);font-weight:500;}
.modal-save:hover{background:#1e3a5f;}
.form-err{font-size:11px;color:var(--red);min-height:16px;margin-bottom:4px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--header);color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-family:var(--sans);opacity:0;transform:translateY(10px);transition:all 0.3s;z-index:300;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">Meridian Insurance</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-label">Email</div>
    <input class="login-input" id="login-email" type="email" placeholder="admin@meridianins.com">
    <div class="login-label">Password</div>
    <input class="login-input" id="login-password" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Shell -->
<div class="shell" id="shell">
  <header>
    <div style="display:flex;align-items:center;">
      <div class="logo">Meridian Insurance</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
    <div class="header-right">
      <a class="header-link" href="index.html">← Dashboard</a>
      <span class="header-user" id="header-user"></span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="content">
    <div class="page-title">User Management</div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val" id="stat-users">-</div></div>
      <div class="stat-card"><div class="stat-label">Active Users</div><div class="stat-val" id="stat-active">-</div></div>
      <div class="stat-card"><div class="stat-label">Total Notes</div><div class="stat-val" id="stat-notes">-</div></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Users</div>
        <button class="add-btn" onclick="openCreateModal()">+ Create User</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create/Edit User Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Create User</div>
    <div class="form-label">Name</div>
    <input class="form-input" id="m-name" placeholder="Full name">
    <div class="form-label">Email</div>
    <input class="form-input" id="m-email" type="email" placeholder="user@meridianins.com">
    <div class="form-label" id="m-pw-label">Password</div>
    <input class="form-input" id="m-password" type="password" placeholder="Min 6 characters">
    <div class="form-label">Role</div>
    <select class="form-select" id="m-role"><option value="user">User</option><option value="admin">Admin</option></select>
    <div class="form-label">WCF Agent ID <span style="text-transform:none;letter-spacing:0;color:var(--muted);font-weight:400;">(optional)</span></div>
    <input class="form-input" id="m-wcf-agent-id" placeholder="e.g. 18655122">
    <div class="form-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="m-save" onclick="saveUser()">Create</button>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal-overlay" id="reset-overlay">
  <div class="modal">
    <div class="modal-title">Reset Password</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;" id="reset-for"></div>
    <div class="form-label">New Password</div>
    <input class="form-input" id="r-password" type="password" placeholder="Min 6 characters">
    <div class="form-err" id="r-err"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeReset()">Cancel</button>
      <button class="modal-save" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://ep-dashboard-v2-backend-1.onrender.com';
let TOKEN = localStorage.getItem('mi_jwt');
let currentUser = null;
let editingId = null;

function api(method, path, body){
  const opts = { method, headers: { 'Content-Type':'application/json' } };
  if(TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if(body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(r => r.json());
}

// ─── Auth ────────────────────────────────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-password').value;
  const err = document.getElementById('login-err');
  if(!email||!pw){ err.textContent='Email and password required'; return; }
  err.textContent='Signing in...';
  const res = await api('POST','/api/auth/login',{email,password:pw});
  if(res.error){ err.textContent=res.error; return; }
  if(res.user.role !== 'admin'){ err.textContent='Admin access required'; return; }
  TOKEN = res.token;
  currentUser = res.user;
  localStorage.setItem('mi_jwt', TOKEN);
  showShell();
}

async function checkAuth(){
  if(!TOKEN) return;
  const res = await api('GET','/api/auth/me');
  if(res.user && res.user.role === 'admin'){
    currentUser = res.user;
    showShell();
  } else {
    localStorage.removeItem('mi_jwt');
    TOKEN = null;
  }
}

function logout(){
  localStorage.removeItem('mi_jwt');
  TOKEN = null;
  currentUser = null;
  document.getElementById('shell').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
}

function showShell(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('shell').style.display='flex';
  document.getElementById('header-user').textContent = currentUser.name;
  loadStats();
  loadUsers();
}

// ─── Data ────────────────────────────────────────────────────────────────────
async function loadStats(){
  const res = await api('GET','/api/admin/stats');
  if(res.totalUsers !== undefined){
    document.getElementById('stat-users').textContent = res.totalUsers;
    document.getElementById('stat-active').textContent = res.activeUsers;
    document.getElementById('stat-notes').textContent = res.totalNotes;
  }
}

async function loadUsers(){
  const res = await api('GET','/api/admin/users');
  if(!res.users) return;
  const tbody = document.getElementById('users-body');
  if(res.users.length === 0){
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px;">No users yet</td></tr>';
    return;
  }
  tbody.innerHTML = res.users.map(u => {
    const d = new Date(u.created_at);
    const date = (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();
    const isSelf = u.id === currentUser.id;
    return `<tr>
      <td style="font-weight:500;">${esc(u.name)}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted);">${esc(u.email)}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td class="date-text">${date}</td>
      <td>
        <button class="action-btn" onclick="openEditModal(${u.id},'${esc(u.name)}','${esc(u.email)}','${u.role}','${esc(u.wcf_agent_id||'')}')">Edit</button>
        <button class="action-btn" onclick="openReset(${u.id},'${esc(u.name)}')">Reset PW</button>
        ${isSelf ? '' : `<button class="action-btn danger" onclick="deleteUser(${u.id},'${esc(u.name)}')">Delete</button>`}
      </td>
    </tr>`;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

// ─── Create / Edit Modal ─────────────────────────────────────────────────────
function openCreateModal(){
  editingId = null;
  document.getElementById('modal-title').textContent = 'Create User';
  document.getElementById('m-name').value = '';
  document.getElementById('m-email').value = '';
  document.getElementById('m-password').value = '';
  document.getElementById('m-role').value = 'user';
  document.getElementById('m-wcf-agent-id').value = '';
  document.getElementById('m-pw-label').style.display = '';
  document.getElementById('m-password').style.display = '';
  document.getElementById('m-save').textContent = 'Create';
  document.getElementById('m-err').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id, name, email, role, wcfAgentId){
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit User';
  document.getElementById('m-name').value = name;
  document.getElementById('m-email').value = email;
  document.getElementById('m-role').value = role;
  document.getElementById('m-wcf-agent-id').value = wcfAgentId || '';
  document.getElementById('m-pw-label').style.display = 'none';
  document.getElementById('m-password').style.display = 'none';
  document.getElementById('m-password').value = '';
  document.getElementById('m-save').textContent = 'Save';
  document.getElementById('m-err').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

async function saveUser(){
  const name = document.getElementById('m-name').value.trim();
  const email = document.getElementById('m-email').value.trim();
  const password = document.getElementById('m-password').value;
  const role = document.getElementById('m-role').value;
  const wcf_agent_id = document.getElementById('m-wcf-agent-id').value.trim();
  const err = document.getElementById('m-err');
  if(!name || !email){ err.textContent='Name and email required'; return; }

  if(editingId){
    const res = await api('PUT','/api/admin/users/'+editingId,{name,email,role,wcf_agent_id});
    if(res.error){ err.textContent=res.error; return; }
    showToast('User updated');
  } else {
    if(!password || password.length < 6){ err.textContent='Password must be at least 6 characters'; return; }
    const res = await api('POST','/api/admin/users',{name,email,password,role,wcf_agent_id});
    if(res.error){ err.textContent=res.error; return; }
    showToast('User created');
  }
  closeModal();
  loadUsers();
  loadStats();
}

// ─── Reset Password ──────────────────────────────────────────────────────────
let resetId = null;
function openReset(id, name){
  resetId = id;
  document.getElementById('reset-for').textContent = 'Reset password for ' + name;
  document.getElementById('r-password').value = '';
  document.getElementById('r-err').textContent = '';
  document.getElementById('reset-overlay').classList.add('open');
}
function closeReset(){ document.getElementById('reset-overlay').classList.remove('open'); }
async function doReset(){
  const pw = document.getElementById('r-password').value;
  if(!pw || pw.length < 6){ document.getElementById('r-err').textContent='Min 6 characters'; return; }
  const res = await api('PUT','/api/admin/users/'+resetId+'/reset-password',{password:pw});
  if(res.error){ document.getElementById('r-err').textContent=res.error; return; }
  closeReset();
  showToast('Password reset');
}

// ─── Delete ──────────────────────────────────────────────────────────────────
async function deleteUser(id, name){
  if(!confirm('Delete user "'+name+'"? This cannot be undone.')) return;
  const res = await api('DELETE','/api/admin/users/'+id);
  if(res.error){ alert(res.error); return; }
  showToast('User deleted');
  loadUsers();
  loadStats();
}

// ─── Toast ───────────────────────────────────────────────────────────────────
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ─── Init ────────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
